<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Nutrition Log</title>
</head>
<body class="bg-gradient-to-br from-green-50 via-lime-50 to-emerald-100 min-h-screen text-slate-800">

  <main class="max-w-6xl mx-auto px-4 py-8">

    <!-- Header -->
    <section class="mb-8">
      <div class="bg-white/80 backdrop-blur-sm rounded-3xl shadow-lg border border-green-100 p-6">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div>
            <h1 class="text-4xl font-bold text-green-700 tracking-tight">🥗 Secure Nutrition Log</h1>
            <p class="text-slate-600 mt-2 text-lg">Track meals, saved foods, and daily progress in your Azure-hosted nutrition dashboard</p>
          </div>

          <div class="text-sm text-slate-600 bg-green-50 px-4 py-2 rounded-2xl border border-green-100">
            Hosted in Azure
          </div>
        </div>
      </div>
    </section>

    <!-- User / Auth -->
    <section class="mb-6">
      <div class="bg-white rounded-3xl shadow-md border border-green-100 p-6">
        <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-6">
          
          <!-- User Info -->
          <div>
            <h2 class="text-2xl font-semibold text-slate-800">User</h2>
            <p id="userInfo" class="text-slate-600 mt-2">Checking user...</p>
            <p id="userRolesInfo" class="text-xs text-slate-500 mt-1"></p>
          </div>

          <!-- Buttons (FIXED LAYOUT) -->
          <div class="flex flex-col items-end gap-2">

            <!-- PRIMARY NAV -->
            <div class="flex flex-wrap items-center gap-3">
              <a
                href="/admin.html"
                id="adminDashboardBtn"
                class="hidden inline-flex items-center justify-center rounded-xl bg-slate-800 px-4 py-2 text-white font-medium shadow hover:bg-slate-900 transition">
                Admin Dashboard
              </a>

              <a
                href="/profile.html"
                class="inline-flex items-center justify-center rounded-xl bg-emerald-600 px-4 py-2 text-white font-medium shadow hover:bg-emerald-700 transition">
                Nutrition Profile
              </a>
            </div>

            <!-- SECONDARY AUTH -->
            <div class="flex items-center gap-2">
              <a
                href="/.auth/login/aad"
                class="text-sm text-green-700 font-medium hover:underline">
                Sign in
              </a>

              <span class="text-slate-300">|</span>

              <a
                href="/.auth/logout"
                class="text-sm text-slate-600 font-medium hover:underline">
                Sign out
              </a>
            </div>

          </div>
        </div>
      </div>
    </section>

    <!-- (rest of your file stays EXACTLY the same) -->

    <!-- Daily Summary -->
    <section class="mb-6">
      <div class="bg-white rounded-3xl shadow-md border border-green-100 p-6">
        <!-- unchanged -->
