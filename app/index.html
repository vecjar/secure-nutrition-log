<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />

  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" href="/icons/icon-192.png" />

  <script src="https://cdn.tailwindcss.com"></script>

  <title>Secure Nutrition Log</title>
  <link rel="stylesheet" href="style.css" />

  <script>
    const navEntry = performance.getEntriesByType("navigation")[0];
    const isReload = navEntry && navEntry.type === "reload";
    const hasSeenStartup = sessionStorage.getItem("hasSeenStartup");

    if (hasSeenStartup && !isReload) {
      document.documentElement.classList.add("startup-seen");
    }
  </script>
</head>

<body class="bg-gradient-to-br from-slate-50 via-emerald-50 to-white">

  <main class="max-w-6xl mx-auto px-4 py-6 sm:py-8">

    <!-- Header -->
    <section class="mb-6 sm:mb-8">
      <div class="bg-white/80 backdrop-blur-sm rounded-3xl shadow-lg border border-green-100 p-4 sm:p-6">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div>
            <h1 class="text-3xl sm:text-4xl font-bold text-green-700 tracking-tight">🥗 Secure Nutrition Log</h1>
            <p class="text-slate-600 mt-2 text-base sm:text-lg">
              Track meals, hit your nutrition targets, and stay consistent each day.
            </p>
          </div>

          <div class="text-sm text-slate-600 bg-green-50 px-4 py-2 rounded-2xl border border-green-100 w-full md:w-auto text-center md:text-left">
            Hosted in Azure
          </div>
        </div>
      </div>
    </section>

    <!-- Today’s Log -->
    <section>
      <div class="bg-white rounded-3xl shadow-md border border-green-100 p-4 sm:p-6">
        <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between px-4 sm:px-5 py-4 bg-emerald-50 rounded-xl">
          <div>
            <h2 class="text-2xl font-semibold text-slate-800">Today’s Log</h2>
            <p class="text-slate-500 text-sm">
              Meal sections stay in breakfast, lunch, dinner, then snack order.
              Use the + button on each section to add meals.
            </p>
          </div>

          <div class="rounded-2xl border border-emerald-100 bg-emerald-50 px-4 py-3 text-sm text-emerald-700 w-full md:w-auto text-center md:text-left">
            Saved foods available:
            <span id="savedFoodsCount" class="font-semibold">0</span>
          </div>
        </div>

        <div id="loadingSpinner" class="hidden text-center my-4">
          <div class="inline-block h-8 w-8 animate-spin rounded-full border-4 border-green-200 border-t-green-600"></div>
          <p class="mt-2 text-sm text-slate-500">Loading...</p>
        </div>

        <p id="entriesMessage" class="text-sm text-slate-600 mb-4"></p>

        <ul id="entriesList" class="space-y-5 sm:space-y-6"></ul>
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
